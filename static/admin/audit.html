<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Audit · Admin · BDA Logistics IDP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3">
      <h1 class="text-base font-semibold flex-1">Admin · Audit</h1>
      <nav class="text-sm flex gap-4">
        <a href="/admin/index.html">Dashboard</a>
        <a href="/admin/users.html">Users</a>
        <a href="/admin/jobs.html">Jobs</a>
        <a href="/admin/audit.html" class="font-medium">Audit</a>
      </nav>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-6 grid gap-4">
    <form id="filters" class="bg-white p-3 rounded-lg shadow-sm flex flex-wrap gap-2 text-sm">
      <input name="action" placeholder="action (e.g. login)" class="border rounded px-2 py-1" />
      <input name="actor_user_id" placeholder="actor uuid" class="border rounded px-2 py-1 w-72" />
      <input name="date_from" type="datetime-local" class="border rounded px-2 py-1" />
      <input name="date_to" type="datetime-local" class="border rounded px-2 py-1" />
    </form>
    <div id="auditTable" class="bg-white rounded-lg shadow-sm overflow-x-auto"></div>
    <div id="auditPaginator"></div>
  </main>

  <script type="module">
    import { ensureAuthed } from "/js/auth.js";
    import { renderAudit } from "/js/audit.js";
    import { bindFilterForm, readQuery, writeQuery } from "/js/filters.js";

    await ensureAuthed("admin");

    async function refresh() {
      await renderAudit({
        tableEl: document.getElementById("auditTable"),
        paginatorEl: document.getElementById("auditPaginator"),
        filters: readQuery(),
      });
    }
    bindFilterForm(document.getElementById("filters"), (data) => { writeQuery(data); refresh(); });
    refresh();
  </script>
</body>
</html>
